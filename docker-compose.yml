services:
  postgres:
    image: postgres:17-alpine
    container_name: leadforgeai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leadforgeai}
      POSTGRES_USER: ${POSTGRES_USER:-leadforgeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadforgeai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leadforgeai} -d ${POSTGRES_DB:-leadforgeai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: leadforgeai-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://leadforgeai:leadforgeai@postgres:5432/leadforgeai}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: leadforgeai-frontend
    depends_on:
      - backend
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  frontend_node_modules:
  postgres_data:
